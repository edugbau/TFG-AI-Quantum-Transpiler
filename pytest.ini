[pytest]
# Pytest config for TFG-Quantum-Transpiler

# Collect tests from the test tree.
testpaths = tests

# Make sure imports such as `src.integration` resolve against this repo.
pythonpath = .

# Show extra info on failures.
addopts = -ra

# Third-party warnings that we do not control.
filterwarnings =
    # Deprecation warning raised internally by stevedore/qiskit-ibm-runtime.
    ignore::DeprecationWarning:stevedore
