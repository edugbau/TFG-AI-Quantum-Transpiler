[pytest]
# ---------------------------------------------------------------------------
# Configuración de pytest para TFG-Quantum-Transpiler
# ---------------------------------------------------------------------------

# Directorio de tests
testpaths = tests

# Mostrar extra info en fallos
addopts = -ra

# ---------------------------------------------------------------------------
# Filtros de warnings
#
# Los warnings de terceros que no podemos controlar se silencian aquí.
# Nunca silenciar warnings de nuestro propio código (src/).
# ---------------------------------------------------------------------------
filterwarnings =
    # Warning de qiskit-ibm-runtime >= 0.42: plugin deprecado internamente.
    # Lo gestiona la librería, no nuestro código. Se elimina en versiones futuras.
    ignore::DeprecationWarning:stevedore
